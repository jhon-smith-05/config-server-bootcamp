server:
  port: 8888

spring:
  application:
    name: config-server

  cloud:
    config:
      server:
        git:
          uri: https://github.com/jhon-smith-05/config-repo
          default-label: main
          #search-paths: '{application}'
          clone-on-start: true
eureka:
  client:
    service-url:
      defaultZone: http://eureka-user:eureka-password@localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

  # Seguridad básica (opcional)
  security:
    user:
      name: config-user
      password: config-password

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info